name: Build WordPress Theme

on:
  push:
    branches:
      - main
    paths:
      - 'pause-urbaine-wordpress/theme/pause-urbaine-single/**'
      - 'pause-urbaine-wordpress/docker-compose.yml'
      - '.github/workflows/build-wordpress-theme.yml'
  pull_request:
    paths:
      - 'pause-urbaine-wordpress/theme/pause-urbaine-single/**'
      - 'pause-urbaine-wordpress/docker-compose.yml'
      - '.github/workflows/build-wordpress-theme.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get git SHA
        id: git-sha
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Git SHA: ${SHORT_SHA}"

      - name: Lint PHP
        run: |
          find pause-urbaine-wordpress/theme/pause-urbaine-single -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Stamp theme version
        run: |
          sed -i "s/Version: .*/Version: 1.0.0-${{ steps.git-sha.outputs.short_sha }}/" pause-urbaine-wordpress/theme/pause-urbaine-single/style.css

      - name: Package theme
        run: |
          cd pause-urbaine-wordpress/theme
          zip -r ../../pause-urbaine-single.zip pause-urbaine-single \
            -x "*.git*" \
            -x "*.DS_Store"

      - name: Upload theme artifact
        uses: actions/upload-artifact@v7
        with:
          name: pause-urbaine-single-${{ steps.git-sha.outputs.short_sha }}
          path: pause-urbaine-wordpress/pause-urbaine-single.zip
          retention-days: 90

      - name: Upload latest theme artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: pause-urbaine-single-latest
          path: pause-urbaine-wordpress/pause-urbaine-single.zip
          retention-days: 365
